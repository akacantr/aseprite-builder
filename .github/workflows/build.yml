name: Build Aseprite
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Enable Long Paths
        run: git config --system core.longpaths true

      - name: Install Build Tools
        run: choco install cmake ninja innosetup

      - name: Fetch Latest Release Metadata
        shell: powershell
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $headers = @{ Authorization = "Bearer $env:GH_TOKEN" }
          $resp = (Invoke-WebRequest -UseBasicParsing -Headers $headers -Uri https://api.github.com/repos/aseprite/aseprite/releases/latest).Content | ConvertFrom-Json
          $asset = $resp.assets | Where-Object { $_.name -like "*Source.zip" } | Select-Object -First 1
          if ($null -eq $asset) { throw "Could not find Source.zip asset" }
          echo "DOWNLOAD_URL=$($asset.browser_download_url)" >> $env:GITHUB_ENV
          echo "ASE_VER=$($resp.tag_name)" >> $env:GITHUB_ENV
          echo "[+] Targeting Version: $($resp.tag_name)"

      - name: Download & Extract Source
        shell: powershell
        run: |
          Invoke-WebRequest -Uri ${{ env.DOWNLOAD_URL }} -OutFile "aseprite_src.zip"
          7z x "aseprite_src.zip" -o"temp_ext"
          $rootFile = Get-ChildItem -Path "temp_ext" -Filter "CMakeLists.txt" -Recurse | Select-Object -First 1
          if ($null -eq $rootFile) { throw "Could not find CMakeLists.txt in ZIP!" }
          $srcDir = $rootFile.Directory.FullName
          mkdir aseprite
          robocopy "$srcDir" "aseprite" /E /MOVE /NFL /NDL /NJH /NJS /nc /ns /np
          echo "[+] Source successfully staged in /aseprite"

      - name: Download & Extract Skia
        shell: powershell
        run: |
          # Create the directory first to prevent 7z errors
          mkdir skia -Force
          echo "Downloading Skia binaries..."
          Invoke-WebRequest -Uri "https://github.com/aseprite/skia/releases/latest/download/Skia-Windows-Release-x64.zip" -OutFile "skia.zip"
          echo "Extracting Skia..."
          7z x "skia.zip" -o"skia" -y
          echo "[+] Skia successfully staged in /skia"

      - name: Initialize MSVC Environment
        uses: ilammy/msvc-dev-cmd@v1

      - name: Run CMake Configuration
        shell: powershell
        run: |
          $src = "$env:GITHUB_WORKSPACE\aseprite"
          $build = "$env:GITHUB_WORKSPACE\build"
          $skia = "$env:GITHUB_WORKSPACE\skia"
          
          mkdir $build -ErrorAction SilentlyContinue
          cd $build
          
          cmake -G Ninja `
            -DCMAKE_BUILD_TYPE=RelWithDebInfo `
            -DLAF_BACKEND=skia `
            -DSKIA_DIR="$skia" `
            -DSKIA_LIBRARY_DIR="$skia\out\Release-x64" `
            -DSKIA_LIBRARY="$skia\out\Release-x64\skia.lib" `
            -DENABLE_UPDATER=OFF `
            -DVERSION_OVERRIDE="${{ env.ASE_VER }}" `
            "$src"

      - name: Compile with Ninja
        run: |
          cd build
          ninja

      - name: Package Installer (Inno Setup)
        shell: powershell
        run: |
          $iss = @"
          [Setup]
          AppName=Aseprite
          AppVersion=${{ env.ASE_VER }}
          DefaultDirName={autopf}\Aseprite
          DefaultGroupName=Aseprite
          OutputBaseFilename=aseprite-setup-${{ env.ASE_VER }}
          OutputDir=../installer
          Compression=lzma
          SolidCompression=yes
          [Files]
          Source: "build\bin\*"; DestDir: "{app}"; Flags: ignoreversion recursesubdirs createallsubdirs
          [Icons]
          Name: "{group}\Aseprite"; Filename: "{app}\aseprite.exe"
          "@
          mkdir installer -Force
          $iss | Out-File -FilePath "aseprite.iss" -Encoding utf8
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" aseprite.iss

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: success()
        with:
          tag_name: ${{ env.ASE_VER }}
          name: Aseprite ${{ env.ASE_VER }}
          files: installer/*.exe
          body: |
            Automated build of Aseprite ${{ env.ASE_VER }}.
            **Note:** This is a personal build for individual use. 
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
